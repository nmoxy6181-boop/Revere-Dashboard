name: Revere Discord Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # Keep bot alive

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Discord Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          WHITELIST_ROLE_ID: ${{ secrets.WHITELIST_ROLE_ID }}
          BLACKLIST_ROLE_ID: ${{ secrets.BLACKLIST_ROLE_ID }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: node bot.js
